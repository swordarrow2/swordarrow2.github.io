{% extends "article.html" %}

{% block title %}
<h1>穿越机所需的工具</h1>
{% endblock %}

{% block content %}
想要对穿越机进行使用、检查、维修，还需要一些工具。<br>
必要工具：
<ul>
    <li>电烙铁</li>
    <li>六角螺丝刀</li>
    <li>焊锡丝</li>
    <li>万用表</li>
    <li>8mm扳手</li>
    <li>吸锡器或吸锡带</li>
</ul>
可选工具：
<ul>
    <li>铜丝球</li>
    <li>夹具</li>
    <li>BGA焊油</li>
    <li>可调电源</li>
    <li>热风枪</li>
    <li>示波器</li>
</ul>

{% endblock %}
